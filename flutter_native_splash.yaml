# Native splash screen config – single source for Android & iOS.
# Regenerate after changes: dart run flutter_native_splash:create

flutter_native_splash:
  # Background color for pre-Flutter native splash (all platforms except Android 12+)
  color: "#0A2447"

  fullscreen: true

  # Splash image for Android (<12) and iOS
  image: assets/icons/native_splash_icon.png

  # Android 12+ uses a separate API (window background + center icon, clipped to circle)
  android_12:
    color: "#0A2447"
    icon_background_color: "#0A2447"
    image: assets/icons/native_splash_icon.png
